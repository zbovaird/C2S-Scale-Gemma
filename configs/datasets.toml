# Dataset Configuration
# Parameters for data loading and graph construction

[datasets]
# Cell2Sentence dataset source
source = "huggingface"  # or "github"
dataset_name = "vandijklab/cell2sentence"  # HF dataset name
github_repo = "https://github.com/vandijklab/cell2sentence"

# Data paths
raw_data_dir = "data/raw"
processed_data_dir = "data/processed"
cache_dir = "cache"

# Graph construction parameters
[knn_graph]
k = 30
metric = "cosine"
use_embeddings = true
embedding_method = "scanpy"  # or "scvi", "umap"

[lr_graph]
# Ligand-receptor interaction database
lr_database = "cellchat"  # or "cellphonedb", "custom"
min_score = 0.5
confidence_threshold = 0.7

[grn_graph]
# Gene regulatory network
grn_method = "scenic"  # or "grnboost", "custom"
min_regulon_size = 10
max_regulon_size = 1000
auc_threshold = 0.01

[preprocessing]
# Cell filtering
min_genes = 200
min_cells = 3
max_genes = 5000
max_cells = 10000

# Gene filtering
min_mean_expression = 0.01
min_cell_fraction = 0.01

# Normalization
normalize_method = "log1p"  # or "zscore", "quantile"
target_sum = 10000

[sampling]
# Neighborhood sampling
max_neighbors = 128
min_neighbors = 32
radial_bands = 5
band_size = 20

[reprogramming.references]
somatic_labels = ["fibroblast", "somatic", "starting_state"]
pluripotent_labels = ["esc", "ipsc", "pluripotent", "stem_cell"]

[reprogramming.window_profile]
partial_window_proximity_min = 0.35
partial_window_proximity_max = 0.75
partial_window_max_risk = 0.60
longevity_safe_proximity_max = 0.65
longevity_safe_max_risk = 0.45
pluripotency_risk_proximity_min = 0.80
pluripotency_risk_score_min = 0.60
min_rejuvenation_score = 0.30
safe_max_pluripotency_marker = 0.40
risk_min_pluripotency_marker = 0.60
min_progress_delta = 0.0
min_somatic_escape = 0.0

[reprogramming.marker_panels]
rejuvenation = ["SIRT1", "FOXO3", "PPARGC1A", "TFAM", "NFE2L2"]
pluripotency_risk = ["NANOG", "LIN28A", "DPPA4", "UTF1", "PRDM14"]
