# Dataset-specific OKSM / reprogramming profiles.
# These are metadata-first manifests that can override references,
# heuristic windows, and marker panels for named studies.

[reprogramming_profiles.gse242423_human_fibroblast_oskm]
title = "Human fibroblast OSKM 14-day single-cell time course"
