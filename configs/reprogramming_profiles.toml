species = "human"
modality = "scRNA-seq"
source_url = "https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE242423"
baseline_data_hint = "data/raw/GSE242423.h5ad"
cell_type_column = "cell_type"
timepoint_column = "timepoint"
timepoint_order = ["D0", "D2", "D4", "D6", "D8", "D10", "D12", "D14", "iPSC"]
notes = "Human fibroblast OSKM induction with finely sampled single-cell transcriptome time course."

